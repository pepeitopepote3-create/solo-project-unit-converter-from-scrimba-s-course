<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="hero">
            <h1>Metric/Imperial Unit Conversion</h1>
            <input id="number">
            <br>
            <button id="convert-btn">Convert</button>
        </div>
        <div id="container">
            <div id="firstConversion" class="conversions">
                <h2>Length (Meter/Feet)</h2>
                <h3 id="lengthResult"></h3>
            </div>
            <div class="conversions" >
                <h2>Volume(Liters/Galons)</h2>
                <h3 id="volumeResult"></h3>
            </div>
            <div class="conversions">
                <h2>Mass(kilograms/Pounds)</h2>
                <h3 id="massResult"></h3>
            </div>
        </div>
    </body>
    <script src="unit_converter.js"></script>
</html>
